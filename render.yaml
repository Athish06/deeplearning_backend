# Render Deployment Configuration
# This file tells Render how to deploy your FastAPI app

services:
  - type: web
    name: sentiment-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11