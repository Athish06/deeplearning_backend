# Render Deployment Configuration
# This file tells Render how to deploy your FastAPI app

services:
  - type: web
    name: sentiment-api
    env: python
    buildCommand: pip install --upgrade pip ; pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SENTIMENT_BACKEND
        value: "hf_api"
      - key: ALLOW_BACKEND_FALLBACK
        value: "true"
      - key: HF_API_TIMEOUT
        value: "60"
      - key: HF_API_TOKEN
        sync: false